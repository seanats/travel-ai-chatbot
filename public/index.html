<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Travel AI - Asisten Perjalanan</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>✈️ Travel AI</h1>
      <p>Asisten perencanaan perjalanan dan itinerary</p>
    </div>
    <div id="chat-box" class="chat-box"></div>
    <div class="form-wrapper">
      <form id="chat-form">
        <input type="text" id="user-input" placeholder="Tanyakan tentang perjalanan..." autocomplete="off" required />
        <button type="submit">Kirim</button>
      </form>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
